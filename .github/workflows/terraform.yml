name: "IAM Phase 1: Zero-Mapping CI"

on: [push, pull_request]

jobs:
  terraform-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify Secrets Exist
        shell: bash
        run: |
          if [ -z "${{ secrets.CLIENT_CREDENTIALS_SECRET }}" ]; then
            echo "❌ ERROR: CLIENT_CREDENTIALS_CLIENT_SECRET is MISSING in GitHub Secrets UI"
            exit 1
          else
            echo "✅ SUCCESS: Secret is present in GitHub"
          fi

      - name: Inject Secrets to TFVARS
        run: |
          echo '{
            "pingone_client_id": "${{ secrets.PINGONE_CLIENT_ID }}",
            "pingone_client_secret": "${{ secrets.PINGONE_CLIENT_SECRET }}",
            "pingone_environment_id": "${{ secrets.PINGONE_ENVIRONMENT_ID }}",
            "pingfederate_admin_password": "${{ secrets.PINGFEDERATE_ADMIN_PASSWORD }}",
            "client_credentials_client_secret": "${{ secrets.CLIENT_CREDENTIALS_SECRET }}",
            "pf_base_url": "https://localhost:9999"
          }' > terraform.tfvars.json

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # No need to pass -var or env vars; it finds the JSON file
        run: terraform plan -refresh=false -input=false