name: "IAM Phase 1: Zero-Mapping CI"

on: [push, pull_request]

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    # 1. CRITICAL: Match this to your GitHub Environment Name (e.g., 'dev' or 'prod')
    environment: dev 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Secrets to TFVARS
        # 2. We use 'env' to make them available to the shell script
        env:
          P1_ID: ${{ secrets.PINGONE_CLIENT_ID }}
          P1_SECRET: ${{ secrets.PINGONE_CLIENT_SECRET }}
          P1_ENV: ${{ secrets.PINGONE_ENVIRONMENT_ID }}
          PF_PASS: ${{ secrets.PINGFEDERATE_ADMIN_PASSWORD }}
          CC_SECRET: ${{ secrets.CLIENT_CREDENTIALS_CLIENT_SECRET }}
        run: |
          echo "{
            \"pingone_client_id\": \"$P1_ID\",
            \"pingone_client_secret\": \"$P1_SECRET\",
            \"pingone_environment_id\": \"$P1_ENV\",
            \"pingfederate_admin_password\": \"$PF_PASS\",
            \"client_credentials_client_secret\": \"$CC_SECRET\",
            \"pf_base_url\": \"https://localhost:9999\"
          }" > terraform.tfvars.json

      - name: Terraform Plan
        # 3. Force the Region via Environment Variable (The SDK bypass)
        env:
          PINGONE_REGION_CODE: "EU"
        run: terraform plan -var-file="terraform.tfvars.json" -refresh=false -input=false