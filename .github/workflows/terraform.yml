name: "IAM Phase 1: Zero-Mapping CI"

on: [push, pull_request]

jobs:
  terraform-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Inject Secrets to TFVARS
        # This creates the JSON file that Terraform loads AUTOMATICALLY
        run: |
          echo '{
            "pingone_client_id": "${{ secrets.PINGONE_CLIENT_ID }}",
            "pingone_client_secret": "${{ secrets.PINGONE_CLIENT_SECRET }}",
            "pingone_environment_id": "${{ secrets.PINGONE_ENVIRONMENT_ID }}",
            "pf_base_url": "https://mock-internal-pf:9999"
          }' > terraform.tfvars.json

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # No need to pass -var or env vars; it finds the JSON file
        run: terraform plan -refresh=false