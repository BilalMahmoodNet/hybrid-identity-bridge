name: "IAM Phase 1: Zero-Mapping CI"

on: [push, pull_request]

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    # 1. CRITICAL: This MUST match the name in Settings > Environments
    environment: DEV 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Inject Secrets
        # 2. We map GitHub Secrets to Shell Variables for the echo command
        env:
          P1_ID: ${{ secrets.PINGONE_CLIENT_ID }}
          P1_SECRET: ${{ secrets.PINGONE_CLIENT_SECRET }}
          P1_ENV: ${{ secrets.PINGONE_ENVIRONMENT_ID }}
          PF_PASS: ${{ secrets.PINGFEDERATE_ADMIN_PASSWORD }}
          CC_SECRET: ${{ secrets.CLIENT_CREDENTIALS_CLIENT_SECRET }}
        run: |
          cat <<EOF > terraform.tfvars.json
          {
            "pingone_client_id": "$P1_ID",
            "pingone_client_secret": "$P1_SECRET",
            "pingone_environment_id": "$P1_ENV",
            "pingfederate_admin_password": "$PF_PASS",
            "client_credentials_client_secret": "$CC_SECRET",
            "pf_base_url": "https://localhost:9999"
          }
          EOF

      - name: Verify File Creation
        run: |
          ls -la ./terraform.tfvars.json
          # This counts the characters in the file. 
          # If it's less than 100 bytes, your secrets are empty.
          wc -c ./terraform.tfvars.json
          
      - name: Terraform Plan
        # We bypass the JSON file entirely. This is the most robust CI/CD method.
        env:
          PINGONE_REGION_CODE: "EU"
          # Direct injection from the GitHub Secret Store to Terraform
          TF_VAR_pingone_client_id: ${{ secrets.PINGONE_CLIENT_ID }}
          TF_VAR_pingone_client_secret: ${{ secrets.PINGONE_CLIENT_SECRET }}
          TF_VAR_pingone_environment_id: ${{ secrets.PINGONE_ENVIRONMENT_ID }}
          TF_VAR_pingfederate_admin_password: ${{ secrets.PINGFEDERATE_ADMIN_PASSWORD }}
          TF_VAR_client_credentials_client_secret: ${{ secrets.CLIENT_CREDENTIALS_CLIENT_SECRET }}
        run: |
          terraform plan \
            -refresh=false \
            -input=false