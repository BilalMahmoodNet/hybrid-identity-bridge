name: "IAM Phase 1: Zero-Mapping CI"

on: [push, pull_request]

jobs:
  terraform-ci:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Inject and Debug
        run: |
          echo '{
            "pingone_client_id": "${{ secrets.PINGONE_CLIENT_ID }}",
            "pingone_client_secret": "${{ secrets.PINGONE_CLIENT_SECRET }}",
            "pingone_environment_id": "${{ secrets.PINGONE_ENVIRONMENT_ID }}",
            "pingfederate_admin_password": "${{ secrets.PINGFEDERATE_ADMIN_PASSWORD }}",
            "client_credentials_client_secret": "${{ secrets.CLIENT_CREDENTIALS_CLIENT_SECRET }}",
            "pf_base_url": "https://localhost:9999"
          }' > terraform.tfvars.json
          echo "Listing files to confirm location:"
          ls -al
          echo "Checking if JSON is valid (should show keys):"
          jq 'keys' terraform.tfvars.json

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          # This is the "Magic Bullet" for the PingOne Provider in CI/CD
          # It bypasses the HCL validation and feeds the SDK directly
          PINGONE_REGION_CODE: "EU" 
          TF_VAR_pingone_region_code: "EU"
        run: |
          terraform plan \
            -var-file="terraform.tfvars.json" \
            -refresh=false \
            -input=false