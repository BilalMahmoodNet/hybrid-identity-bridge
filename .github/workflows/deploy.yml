name: "Identity-as-Code Deployment"
on: [push]

permissions:
  id-token: write # CRITICAL for Secretless OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Az CLI login'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          PINGONE_CLIENT_ID: ${{ secrets.P1_CLIENT_ID }}
          PINGONE_CLIENT_SECRET: ${{ secrets.P1_CLIENT_SECRET }}